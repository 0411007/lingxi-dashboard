<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="filename" content="lingxi_ai_chat.html">
    <title>灵犀导购助理 - 电商AI导购</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#7C8CFF',
                        bgMain: '#F7F9FC',
                        userBubble: '#EDEFF3',
                        aiBubble: '#FFFFFF',
                        textMain: '#2D3436',
                        textMuted: '#8A94A6',
                        divider: '#E6EAF2'
                    },
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans SC', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 2px 8px rgba(0,0,0,0.05)',
                        'float': '0 10px 25px -5px rgba(124, 140, 255, 0.1)'
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #E2E8F0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: screen;
            margin: 0;
            font-family: 'Noto Sans SC', sans-serif;
        }
        .iphone-frame {
            width: 375px;
            height: 812px;
            background: #F7F9FC;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border-radius: 40px;
            border: 8px solid #1a1a1a;
        }
        .chat-content {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
            padding: 16px;
        }
        .chat-content::-webkit-scrollbar { display: none; }
        .bubble-max { max-width: 260px; }
        .user-bubble { border-radius: 16px 4px 16px 16px; }
        .ai-bubble { border-radius: 4px 16px 16px 16px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
    </style>
</head>
<body>
    <div class="iphone-frame">
        <!-- 顶部导航栏 -->
        <header class="h-[52px] bg-white border-b border-gray-100 flex items-center justify-between px-4 shrink-0 z-10">
            <div class="flex items-center text-gray-500 cursor-pointer">
                <i data-lucide="chevron-down" class="w-5 h-5"></i>
            </div>
            <h1 class="text-[16px] font-bold text-textMain">灵犀导购助理</h1>
            <div class="flex items-center gap-3 text-gray-500">
                <i data-lucide="settings" class="w-5 h-5 cursor-pointer"></i>
                <div class="flex items-center text-primary text-xs font-medium cursor-pointer">
                    <i data-lucide="headphones" class="w-4 h-4 mr-1"></i>
                    <span>转人工</span>
                </div>
            </div>
        </header>

        <!-- 聊天内容区 -->
        <main class="chat-content space-y-6">
            <!-- 用户消息 1 -->
            <div class="flex justify-end items-start gap-2">
                <div class="user-bubble bubble-max bg-userBubble p-3 text-[14px] text-textMain leading-relaxed">
                    算了，颜色太鲜艳了。
                </div>
                <img src="https://images.unsplash.com/photo-1535711861845-849306460b83?w=100&h=100&fit=crop" class="avatar" alt="User">
            </div>

            <!-- 用户消息 2 -->
            <div class="flex justify-end items-start gap-2">
                <div class="user-bubble bubble-max bg-userBubble p-3 text-[14px] text-textMain leading-relaxed">
                    你能不能快点，我都烦了。
                </div>
                <img src="https://images.unsplash.com/photo-1535711861845-849306460b83?w=100&h=100&fit=crop" class="avatar" alt="User">
            </div>

            <!-- AI + 人工客服接入消息 -->
            <div class="flex justify-start items-start gap-2">
                <div class="bg-primary/10 w-8 h-8 rounded-full flex items-center justify-center shrink-0">
                    <i data-lucide="bot" class="w-5 h-5 text-primary"></i>
                </div>
                <div class="ai-bubble bubble-max bg-white shadow-soft overflow-hidden">
                    <div class="p-3 text-[14px] text-textMain leading-relaxed">
                        没能懂您的心思，灵犀正在努力学习中🙏！为了给您挑到最心仪的衣服，我已经为您呼叫了我们的金牌真人导购接入会话：
                    </div>
                    <!-- 分割线 -->
                    <div class="border-t border-divider my-1 mx-3"></div>
                    <!-- 嵌入的人工客服模块 -->
                    <div class="p-3 bg-slate-50/50">
                        <div class="flex items-center gap-1.5 mb-2">
                            <span class="text-[10px] px-1.5 py-0.5 bg-blue-100 text-primary rounded-sm font-bold">MANUAL</span>
                            <span class="text-[12px] text-textMuted font-medium">👨‍💻 金牌导购-李雷 已接入</span>
                        </div>
                        <div class="text-[13px] text-textMain italic border-l-2 border-primary/30 pl-2 py-1">
                            “亲，您好，刚才的聊天记录我都看啦！海岛风我给您找几件克莱因蓝的如何？”
                        </div>
                    </div>
                </div>
            </div>

            <!-- 人工客服单独回复 -->
            <div class="flex justify-start items-start gap-2">
                <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&h=100&fit=crop" class="avatar" alt="Staff">
                <div class="ai-bubble bubble-max bg-white shadow-soft p-3 text-[14px] text-textMain leading-relaxed">
                    亲亲您别急！我正手动去仓库帮您翻新款实物图呢，两分钟后发您！您稍等我一下下好吗？👩🏻
                </div>
            </div>
        </main>

        <!-- 底部输入栏 -->
        <footer class="bg-white shrink-0 pt-2 pb-6 px-4 shadow-[0_-4px_12px_rgba(0,0,0,0.03)]">
            <div class="flex items-center gap-3">
                <i data-lucide="plus-circle" class="w-6 h-6 text-gray-400 cursor-pointer"></i>
                <i data-lucide="image" class="w-6 h-6 text-gray-400 cursor-pointer"></i>
                <div class="flex-1 h-9 bg-[#F3F5F7] rounded-full flex items-center px-4">
                    <span class="text-gray-400 text-sm">请输入...</span>
                </div>
                <div class="w-9 h-9 bg-primary rounded-full flex items-center justify-center text-white cursor-pointer shadow-float">
                    <i data-lucide="send-horizontal" class="w-4 h-4"></i>
                </div>
            </div>
            
            <!-- 状态提示 -->
            <div class="mt-4 text-center">
                <p class="text-[12px] text-textMuted flex items-center justify-center gap-1">
                    <i data-lucide="lock" class="w-3 h-3"></i>
                    （C端AI输入栏已禁用）转为全人工客服模式
                </p>
            </div>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化图标
            lucide.createIcons();
            
            // 模拟简单的滚动到底部
            const chatContent = document.querySelector('.chat-content');
            chatContent.scrollTop = chatContent.scrollHeight;

            // 微交互：点击输入框效果
            const inputArea = document.querySelector('.flex-1.h-9');
            inputArea.addEventListener('click', () => {
                console.log('Input clicked, but currently in manual mode message.');
            });
        });
    </script>
</body>
</html>
